<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tables</title>
  </head>
  <body>
    <main>
      <h1>Tables</h1>
      <table>
        <thead>
          <tr>
            <th scope="col">Column Header 1</th>
            <th scope="col">Column Header 2</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <th scope="row">Row Header 1</th>
            <td>Body Cell 1</td>
          </tr>
          <tr>
            <th scope="row">Row Header 2</th>
            <td>Body Cell 2</td>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <td>Footer Cell 1</td>
            <td>Footer Cell 2</td>
          </tr>
        </tfoot>
      </table>
    </main>
  </body>
</html>
