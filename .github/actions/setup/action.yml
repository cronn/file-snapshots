name: Setup

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 10.33.0
        cache: true

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: ".node-version"
        cache: "pnpm"

    - name: Install dependencies
      run: pnpm install
      shell: bash
