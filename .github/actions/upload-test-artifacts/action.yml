name: Upload test artifacts
inputs:
  name:
    required: true

runs:
  using: composite
  steps:
    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: vitest-reports-${{ inputs.name }}
        path: packages/*/coverage/
        retention-days: 3

    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: playwright-reports-${{ inputs.name }}
        path: packages/*/playwright-report/
        retention-days: 3
