name: Release pipeline

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  TURBO_TELEMETRY_DISABLED: 1

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Run setup
        uses: ./.github/actions/setup

      - name: Remove devEngines.packageManager for npm info during release
        run: jq 'del(.devEngines.packageManager)' package.json > tmp.json && mv tmp.json package.json

      - name: Configure npm token
        run: npm config set "//registry.npmjs.org/:_authToken" "${NPM_TOKEN}" # pnpm config set is broken

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1.7.0
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: "ci: Version Packages"
          title: "ci: Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
