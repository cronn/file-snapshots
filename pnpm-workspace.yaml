packages:
  - packages/*
allowBuilds:
  esbuild: false
  node: true

catalog:
  "@arethetypeswrong/core": 0.18.2
  "@changesets/cli": 2.31.0
  "@npm/types": 2.1.0
  "@playwright/test": 1.59.1
  "@pnpm/meta-updater": 2.0.6
  "@types/node": 24.12.2
  "@typescript/native-preview": 7.0.0-dev.20260427.1
  "@vitest/coverage-v8": 4.1.5
  "@vitest/expect": 4.1.5
  "eslint": 10.2.1
  "eslint-config-prettier": 10.1.8
  "eslint-plugin-check-file": 3.3.1
  "eslint-plugin-unused-imports": 4.4.1
  "knip": 6.7.0
  "markdown-table": 3.0.4
  "oxc-minify": 0.128.0
  "oxfmt": 0.46.0
  "package-directory": 8.2.0
  "publint": 0.3.18
  "rimraf": 6.1.3
  "tsdown": 0.21.10
  "turbo": 2.9.7
  "typescript-eslint": 8.59.0
  "vitepress": 2.0.0-alpha.17
  "vitest": 4.1.5
  "yaml": 2.8.3
dedupePeers: true

includeWorkspaceRoot: true

minimumReleaseAge: 10080 # 1 week
minimumReleaseAgeExclude:
  - "turbo@2.9.7"
  - "@turbo/darwin-64@2.9.7"
  - "@turbo/darwin-arm64@2.9.7"
  - "@turbo/linux-64@2.9.7"
  - "@turbo/linux-arm64@2.9.7"
  - "@turbo/windows@2.9.7"
  - "@turbo/windows-64@2.9.7"
  - "@turbo/windows-arm64@2.9.7"

overrides:
  "@types/node": "<25"
  "cross-spawn": ">=7.0.5"
  "esbuild": ">=0.25.0"
  "vite": ">=8.0.5"

saveExact: true

trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 40320 # 4 weeks
